name: GitHub Actions CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_SANDBOX_LINUX: 1

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read

    steps:
    - name: Set up Homebrew
      id: set-up-homebrew
      uses: Homebrew/actions/setup-homebrew@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # To fix circular dependency issue, see:
    # https://github.com/homebrew-ffmpeg/homebrew-ffmpeg/issues/13
    - name: Remove chromaprint from ffmpeg formula
      run: |
        grep -v chromaprint Formula/ffmpeg.rb > Formula/ffmpeg.rb.tmp
        mv Formula/ffmpeg.rb.tmp Formula/ffmpeg.rb

    - name: Cache Homebrew Bundler RubyGems
      uses: actions/cache@v4
      with:
        path: ${{ steps.set-up-homebrew.outputs.gems-path }}
        key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
        restore-keys: ${{ matrix.os }}-rubygems-

    # Run test-bot as separate steps, mirroring `brew tap-new` output. Each
    # `brew test-bot` invocation re-establishes tap trust, so the cleanup step
    # cannot wipe the trust marker before `brew doctor` runs. See:
    # https://github.com/Homebrew/brew/issues/22775
    - run: brew test-bot --only-cleanup-before

    - run: brew test-bot --only-setup

    - run: brew test-bot --only-tap-syntax

    - run: brew test-bot --only-formulae
      if: github.event_name == 'pull_request'

    - name: Upload bottles as artifact
      if: always() && github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: bottles_${{ matrix.os }}
        path: '*.bottle.*'

  test-with-options:
    if: github.event_name == 'pull_request' && contains(join(github.event.pull_request.labels.*.name, ' '), 'test:')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Set up Homebrew
      uses: Homebrew/actions/setup-homebrew@main

    - name: Remove chromaprint from ffmpeg formula
      run: |
        grep -v chromaprint Formula/ffmpeg.rb > Formula/ffmpeg.rb.tmp
        mv Formula/ffmpeg.rb.tmp Formula/ffmpeg.rb

    - name: Determine build flags from labels
      id: flags
      uses: actions/github-script@v7
      with:
        script: |
          const labels = context.payload.pull_request.labels.map(l => l.name);
          const flags = labels
            .filter(l => l.startsWith('test:'))
            .map(l => '--with-' + l.replace('test:', ''));
          const result = flags.join(' ');
          core.info(`Build flags: ${result}`);
          core.setOutput('flags', result);

    - name: Install with flags
      run: brew install --verbose --build-from-source ./Formula/ffmpeg.rb ${{ steps.flags.outputs.flags }}

    - name: Test
      run: brew test ./Formula/ffmpeg.rb
